<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Диалоговое окно «Абзац» — интерактивный урок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef2f7;
  --card: #ffffff;
  --primary: #1a56db;
  --primary-soft: #e8effd;
  --primary-glow: #3b82f6;
  --accent: #f97316;
  --accent-soft: #fff4e6;
  --text: #1e293b;
  --text-soft: #475569;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --error: #dc2626;
  --error-bg: #fee2e2;
  --border: #e2e8f0;
  --radius: 20px;
  --shadow-card: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.12);
  --font-head: 'Raleway', 'Segoe UI', sans-serif;
  --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  line-height:1.65;min-height:100vh;-webkit-text-size-adjust:100%;
}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,#0f2847 0%,#1a56db 60%,#3b82f6 100%);
  color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden;
}
.header::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;height:40px;
  background:var(--bg);border-radius:50% 50% 0 0 / 100% 100% 0 0;
}
.header h1{font-family:var(--font-head);font-size:1.75rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:0.3rem;position:relative;}
.header p{font-size:1rem;opacity:0.85;position:relative;}

/* ===== PROGRESS ===== */
.prog-wrap{
  background:var(--card);padding:0.6rem 1.25rem;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);position:sticky;top:0;z-index:200;
}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.6s;}
.prog-label{font-size:0.78rem;color:var(--text-soft);font-weight:600;margin-top:0.3rem;}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:6px;padding:0.6rem 1rem 0;max-width:940px;margin:0 auto;
  overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;padding:0.4rem 0.75rem;border:none;background:var(--card);
  border-radius:12px 12px 0 0;font-family:var(--font-body);font-size:0.78rem;font-weight:700;
  color:var(--text-soft);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;
  transition:all 0.2s;
}
.tab:hover{color:var(--primary);}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);}
.tab.done{color:var(--success);}
.tab.done::after{content:' ✓';}

/* ===== MAIN CARD ===== */
.wrap{max-width:940px;margin:0 auto;padding:0 1rem 2rem;}
.card{
  background:var(--card);border-radius:0 var(--radius) var(--radius) var(--radius);
  box-shadow:var(--shadow-card);padding:1.75rem;animation:slideUp 0.35s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.card-title{
  font-family:var(--font-head);font-size:1.3rem;font-weight:800;color:var(--primary);
  margin-bottom:1.25rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;
}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--primary);color:#fff;width:34px;height:34px;border-radius:50%;
  font-size:0.85rem;font-weight:800;flex-shrink:0;font-family:var(--font-head);
}

/* ===== STEP CARDS (progressive reveal) ===== */
.steps-container{position:relative;}
.step{
  display:none;opacity:0;transition:opacity 0.4s;
}
.step.visible{display:block;opacity:1;animation:fadeStep 0.5s ease;}
@keyframes fadeStep{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Text block — the blue "info" card */
.info-card{
  background:linear-gradient(135deg,#f0f5ff 0%,#e8effd 100%);
  border-radius:16px;padding:1.25rem 1.4rem;margin-bottom:1.25rem;
  border:1px solid #d0ddfb;position:relative;
  font-size:1.05rem;line-height:1.85;color:var(--text);
}
.info-card strong{color:var(--primary);font-weight:700;}
.info-card em{color:var(--accent);font-style:normal;font-weight:600;}
.info-card .info-icon{
  position:absolute;top:-10px;left:16px;
  background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;
}

/* ===== NEXT BUTTON ===== */
.next-step-wrap{text-align:center;margin:0.75rem 0 1rem;}
.next-step-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  background:#16a34a;color:#fff;border:none;border-radius:12px;
  padding:0.7rem 1.5rem;font-family:var(--font-body);font-size:0.95rem;
  font-weight:700;cursor:pointer;transition:all 0.2s;
  box-shadow:0 3px 12px rgba(22,163,74,0.35);
  animation:pulse-green 2s ease-in-out infinite;
}
@keyframes pulse-green{
  0%,100%{box-shadow:0 3px 12px rgba(22,163,74,0.35);}
  50%{box-shadow:0 3px 24px rgba(22,163,74,0.6),0 0 0 6px rgba(22,163,74,0.15);}
}
.next-step-btn:hover{background:#15803d;transform:translateY(-1px);animation:none;box-shadow:0 5px 18px rgba(22,163,74,0.4);}
.next-step-btn:active{transform:scale(0.97);}
.next-step-btn.hidden{display:none;}
.next-step-btn svg{width:18px;height:18px;fill:currentColor;}

/* ===== IMAGES ===== */
.img-wrap{text-align:center;margin:1rem 0 1.25rem;}
.img-wrap img{
  max-width:100%;height:auto;border-radius:14px;border:2px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,0.1);cursor:zoom-in;
}
.img-cap{font-size:0.8rem;color:var(--text-soft);margin-top:0.4rem;font-style:italic;}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;justify-content:center;align-items:center;padding:1rem;cursor:zoom-out;}
.lb.open{display:flex;}
.lb img{max-width:96vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
.lb-x{position:absolute;top:0.8rem;right:1.2rem;background:none;border:none;color:#fff;font-size:2.2rem;cursor:pointer;}

/* ===== DEMO ===== */
.demo-box{
  background:#f8fafb;border:2px dashed #d5dce6;border-radius:14px;
  padding:1.25rem;margin:1rem 0 1.25rem;
}
.demo-box h3{font-family:var(--font-head);font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:0.75rem;}
.demo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.6rem;margin-bottom:0.75rem;}
.demo-field{display:flex;flex-direction:column;gap:0.25rem;}
.demo-field label{font-size:0.72rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.04em;}
.demo-field select,.demo-field input{
  padding:0.45rem 0.55rem;border:2px solid var(--border);border-radius:8px;
  font-family:var(--font-body);font-size:0.9rem;background:#fff;color:var(--text);width:100%;
}
.demo-field select:focus,.demo-field input:focus{outline:none;border-color:var(--primary);}

.preview-label{
  font-size:0.75rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;
  letter-spacing:0.05em;margin-bottom:0.4rem;padding-left:2px;
}
.preview-box{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:1.25rem;min-height:80px;box-shadow:inset 0 2px 6px rgba(0,0,0,0.03);
  overflow:hidden;
}
.dtxt{font-family:'Times New Roman',Georgia,serif;font-size:14px;line-height:1.5;color:#333;transition:all 0.3s;word-wrap:break-word;}

/* ===== QUIZ ===== */
.qq{background:#f8fafc;border-radius:14px;padding:1.15rem;margin:0.75rem 0;}
.qq p{font-weight:700;font-size:1rem;margin-bottom:0.6rem;line-height:1.5;}
.qopts{display:flex;flex-direction:column;gap:0.35rem;}
.qo{
  display:flex;align-items:center;gap:0.55rem;padding:0.6rem 0.85rem;
  border:2px solid var(--border);border-radius:10px;cursor:pointer;
  background:#fff;font-size:0.92rem;line-height:1.4;transition:all 0.2s;
}
.qo:hover{border-color:var(--primary);background:var(--primary-soft);}
.qo.ok{border-color:var(--success);background:var(--success-bg);}
.qo.no{border-color:var(--error);background:var(--error-bg);}
.qo input[type="radio"]{accent-color:var(--primary);width:17px;height:17px;flex-shrink:0;}
.fb{padding:0.8rem;border-radius:10px;margin-top:0.6rem;font-weight:600;font-size:0.88rem;display:none;line-height:1.5;}
.fb.show{display:block;animation:fadeStep 0.3s;}
.fb.ok{background:var(--success-bg);color:#14532d;border:1px solid var(--success);}
.fb.no{background:var(--error-bg);color:#7f1d1d;border:1px solid var(--error);}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;gap:0.4rem;padding:0.65rem 1.2rem;
  border:none;border-radius:10px;font-family:var(--font-body);font-size:0.92rem;
  font-weight:700;cursor:pointer;transition:all 0.2s;
}
.btn-p{background:var(--primary);color:#fff;}
.btn-p:hover{background:#1544b8;}
.btn-a{background:var(--accent);color:#fff;}
.btn-a:hover{background:#ea6a0e;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.nav-btns{display:flex;justify-content:space-between;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);gap:0.5rem;}

.fin{text-align:center;padding:2rem 1rem;}
.fin-score{font-family:var(--font-head);font-size:3.5rem;font-weight:900;color:var(--primary);margin:0.5rem 0;}
.fin-stars{font-size:2.5rem;margin:0.5rem 0;}
.fin-msg{font-size:1.05rem;color:var(--text-soft);margin-bottom:1.5rem;}

/* ===== WORD DIALOG ===== */
.wd{
  background:#f0f0f0;border:1px solid #888;border-radius:4px;
  box-shadow:0 6px 30px rgba(0,0,0,0.22);max-width:520px;margin:1.5rem auto;
  font-family:'Segoe UI',Tahoma,sans-serif;font-size:12px;color:#1a1a1a;
}
.wd-top{background:linear-gradient(180deg,#fff,#ececec);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ccc;}
.wd-top span{font-size:12px;}
.wd-tabs{display:flex;background:#f0f0f0;border-bottom:1px solid #aaa;padding:0 8px;}
.wd-tab{padding:5px 14px;font-size:11.5px;border:1px solid transparent;border-bottom:none;background:transparent;cursor:default;font-family:inherit;color:#1a1a1a;margin-bottom:-1px;border-radius:3px 3px 0 0;}
.wd-tab.on{background:#f0f0f0;border-color:#aaa;border-bottom-color:#f0f0f0;font-weight:600;}
.wd-body{padding:12px 14px;}
.wg{border:1px solid #d5dfe5;border-radius:3px;padding:10px 12px 8px;margin-bottom:10px;position:relative;}
.wg-lbl{position:absolute;top:-8px;left:10px;background:#f0f0f0;padding:0 4px;font-size:11px;color:#444;font-weight:600;}

/* Word dialog row — simple label + control */
.wr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.wr label{font-size:11.5px;min-width:85px;flex-shrink:0;}
.wr select,.wr input[type="text"]{font-family:'Segoe UI',Tahoma,sans-serif;font-size:11.5px;padding:3px 6px;border:1px solid #7a7a7a;background:#fff;border-radius:1px;}
.wr select{min-width:130px;}
.wr input[type="text"]{width:65px;}

/* 2-column grid for Отступ & Интервал — stays 2 columns even on mobile */
.wd-grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px 12px;
  margin-bottom:6px;
}
.wd-cell{display:flex;align-items:center;gap:4px;min-width:0;}
.wd-cell label{font-size:11.5px;white-space:nowrap;flex-shrink:0;}
.wd-cell input[type="text"]{
  font-family:'Segoe UI',Tahoma,sans-serif;font-size:11.5px;
  padding:3px 5px;border:1px solid #7a7a7a;background:#fff;border-radius:1px;
  width:100%;min-width:0;max-width:70px;
}
.wd-cell select{
  font-family:'Segoe UI',Tahoma,sans-serif;font-size:11.5px;
  padding:3px 5px;border:1px solid #7a7a7a;background:#fff;border-radius:1px;
  width:100%;min-width:0;
}

.wchk{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;margin-top:4px;}
.wchk input{width:13px;height:13px;}
.wp-lbl{font-size:11px;color:#444;font-weight:600;margin-bottom:4px;}
.wp-box{border:1px solid #aaa;background:#fff;border-radius:2px;padding:10px 12px;min-height:56px;}
.wp-txt{font-family:'Times New Roman',serif;font-size:8px;line-height:1.4;color:#888;}
.wp-txt .samp{color:#333;}
.wd-foot{display:flex;justify-content:flex-end;align-items:center;gap:6px;padding:8px 14px 12px;border-top:1px solid #ddd;}
.wd-foot .wlnk{font-size:11px;color:#0066cc;text-decoration:underline;cursor:default;margin-right:auto;}
.wb{font-family:'Segoe UI',Tahoma,sans-serif;font-size:11.5px;padding:4px 20px;border:1px solid #adadad;border-radius:2px;background:linear-gradient(180deg,#f5f5f5,#e0e0e0);cursor:pointer;color:#1a1a1a;min-width:70px;text-align:center;}
.wb:hover{background:linear-gradient(180deg,#e8e8e8,#d5d5d5);}
.wb.wbp{background:linear-gradient(180deg,#0091ff,#0078d4);color:#fff;border-color:#005a9e;}
.wb.wbp:hover{background:linear-gradient(180deg,#0078d4,#005a9e);}

.task-card{background:var(--accent-soft);border:2px solid var(--accent);border-radius:14px;padding:1.15rem;margin-bottom:1.25rem;}
.task-card h3{font-family:var(--font-head);font-size:1rem;font-weight:700;color:#92400e;margin-bottom:0.5rem;}
.task-card p{font-size:0.95rem;line-height:1.75;color:#78350f;}
.task-card strong{color:#c2410c;}

.tres{padding:1.15rem;border-radius:12px;margin-top:1rem;font-weight:600;font-size:0.92rem;line-height:1.6;display:none;}
.tres.show{display:block;animation:fadeStep 0.4s;}
.tres.ok{background:var(--success-bg);color:#14532d;border:2px solid var(--success);}
.tres.no{background:var(--error-bg);color:#7f1d1d;border:2px solid var(--error);}
.tres ul{margin:0.5rem 0 0 1.1rem;font-weight:400;}
.tres li{margin-bottom:0.2rem;}

.wf-err{border-color:#ef4444!important;background:#fee2e2!important;}
.wf-ok{border-color:#10b981!important;background:#d1fae5!important;}

/* ===== PRACTICE LAYOUT ===== */
.prac-layout{
  display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;
}
.prac-dialog{min-width:0;}
.prac-live{min-width:0;}
.prac-live-label{
  font-family:var(--font-head);font-size:0.88rem;font-weight:700;
  color:var(--primary);margin-bottom:0.6rem;
}
.prac-live-page{
  background:#fff;border:1px solid #ccc;border-radius:6px;
  padding:1.5rem 1.75rem;box-shadow:0 2px 12px rgba(0,0,0,0.08);
  font-family:'Times New Roman',Georgia,serif;font-size:14px;
  line-height:1.5;color:#1a1a1a;min-height:200px;
  transition:all 0.3s ease;
}
.live-p{
  margin-bottom:0;transition:all 0.3s ease;
}
.live-title{
  text-align:center;font-size:14px;margin:0.5rem 0;
}
.live-table{
  width:85%;margin:0.5rem auto;border-collapse:collapse;font-size:13px;
}
.live-table th,.live-table td{
  border:1px solid #555;padding:4px 10px;
}
.live-table th{
  text-align:center;font-weight:700;
}
.live-table tbody td:first-child{text-align:left;}
.live-table tbody td:last-child{text-align:center;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .header{padding:1.75rem 1rem 1.5rem;}
  .header h1{font-size:1.4rem;}
  .tabs{padding:0.5rem 0.6rem 0;}
  .tab{padding:0.35rem 0.6rem;font-size:0.73rem;}
  .wrap{padding:0 0.6rem 1.5rem;}
  .card{padding:1.25rem;border-radius:0 14px 14px 14px;}
  .card-title{font-size:1.15rem;}
  .info-card{font-size:1rem;padding:1.1rem 1.15rem;}
  .demo-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
  .wd{max-width:100%;}
  .wd-grid2{gap:5px 8px;}
  .wd-cell label{font-size:10.5px;}
  .wd-cell input[type="text"],.wd-cell select{font-size:10.5px;padding:3px 4px;}
  .prac-layout{grid-template-columns:1fr;gap:1rem;}
  .prac-live-page{padding:1.25rem;font-size:13px;}
  .live-table{width:95%;font-size:12px;}
}
@media(max-width:480px){
  .header{padding:1.25rem 0.75rem 1.25rem;}
  .header h1{font-size:1.2rem;}
  .header p{font-size:0.88rem;}
  .prog-wrap{padding:0.5rem 0.75rem;}
  .tabs{padding:0.4rem 0.4rem 0;gap:4px;}
  .tab{padding:0.3rem 0.45rem;font-size:0.68rem;}
  .wrap{padding:0 0.4rem 1rem;}
  .card{padding:1rem;border-radius:0 10px 10px 10px;}
  .card-title{font-size:1.05rem;}
  .badge{width:28px;height:28px;font-size:0.78rem;}
  .info-card{font-size:0.95rem;padding:1rem;line-height:1.75;border-radius:12px;}
  .info-card .info-icon{width:24px;height:24px;font-size:0.75rem;top:-8px;}
  .next-step-btn{font-size:0.9rem;padding:0.65rem 1.25rem;}
  .img-wrap img{border-radius:10px;border-width:1px;}
  .demo-box{padding:1rem;border-radius:12px;}
  .demo-grid{grid-template-columns:1fr 1fr;gap:0.4rem;}
  .demo-field label{font-size:0.68rem;}
  .demo-field select,.demo-field input{font-size:0.88rem;padding:0.45rem 0.5rem;}
  .preview-label{font-size:0.72rem;margin-bottom:0.3rem;}
  .preview-box{padding:1.1rem;border-radius:8px;}
  .dtxt{font-size:14px;line-height:1.55;}
  .qq{padding:0.9rem;}
  .qq p{font-size:0.92rem;}
  .qo{padding:0.5rem 0.7rem;font-size:0.85rem;}
  .btn{padding:0.55rem 1rem;font-size:0.85rem;}
  .fin-score{font-size:2.8rem;}
  .wd{font-size:11px;margin:1rem auto;}
  .wd-body{padding:8px 10px;}
  .wg{padding:8px 8px 6px;}
  .wd-grid2{gap:4px 6px;}
  .wd-cell label{font-size:10px;}
  .wd-cell input[type="text"]{font-size:10px;padding:2px 4px;max-width:55px;}
  .wd-cell select{font-size:10px;padding:2px 3px;}
  .wb{padding:4px 14px;font-size:10.5px;min-width:58px;}
  .wd-tab{padding:4px 8px;font-size:10.5px;}
  .task-card p{font-size:0.88rem;}
}
@media(max-width:360px){
  .demo-grid{grid-template-columns:1fr;}
  .wd-cell label{font-size:9.5px;}
  .wd-cell input[type="text"]{max-width:48px;font-size:9.5px;}
  .wd-cell select{font-size:9.5px;}
}
</style>
</head>
<body>

<div class="header">
  <h1>📝 Диалоговое окно «Абзац»</h1>
  <p>Интерактивный урок по форматированию текста</p>
</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
  <div class="prog-label" id="pl">Раздел 1 из 7</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="wrap" id="mc"></div>

<div class="lb" id="lb" onclick="clb()">
  <button class="lb-x" aria-label="Закрыть">&times;</button>
  <img id="lbi" src="" alt="">
</div>

<script>
function olb(e){document.getElementById('lbi').src=e.src;document.getElementById('lb').classList.add('open');}
function clb(){document.getElementById('lb').classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')clb();});

/* ========================================
   STEP SYSTEM — progressive reveal
   ======================================== */
function showNextStep(sectionIdx) {
  var container = document.getElementById('steps-'+sectionIdx);
  if(!container) return;
  var steps = container.querySelectorAll('.step');
  var btn = document.getElementById('nxt-'+sectionIdx);
  var shown = 0;
  for(var i=0;i<steps.length;i++){if(steps[i].classList.contains('visible'))shown++;}
  if(shown < steps.length){
    steps[shown].classList.add('visible');
    steps[shown].scrollIntoView({behavior:'smooth',block:'nearest'});
    shown++;
  }
  if(shown >= steps.length && btn) btn.classList.add('hidden');
}

var cur=0,done={},qDone=false;

function rTabs(){
  var c=document.getElementById('tabs'),h='';
  for(var i=0;i<S.length;i++){var cl='tab';if(i===cur)cl+=' on';if(done[i])cl+=' done';
    h+='<button class="'+cl+'" onclick="go('+i+')">'+S[i].ic+' '+S[i].t+'</button>';}
  c.innerHTML=h;
}
function rSec(i){
  cur=i;var s=S[i],m=document.getElementById('mc');
  var pv=i>0?'<button class="btn btn-p" onclick="go('+(i-1)+')">← Назад</button>':'<div></div>';
  var nx=i<S.length-1?'<button class="btn btn-p" onclick="go('+(i+1)+')">Далее →</button>':'<div></div>';
  m.innerHTML='<div class="card"><div class="card-title"><span class="badge">'+(i+1)+'</span>'+s.h+'</div>'
    +s.c()+'<div class="nav-btns">'+pv+nx+'</div></div>';
  done[i]=true;rTabs();uProg();
  window.scrollTo({top:0,behavior:'smooth'});
  if(i===3)setTimeout(uS,50);
  if(i===6)setTimeout(function(){uPP();},50);
}
function go(i){rSec(i);}
function uProg(){
  var n=0;for(var k in done)if(done[k])n++;
  var p=Math.round((n/S.length)*100);
  document.getElementById('pf').style.width=p+'%';
  document.getElementById('pl').textContent='Раздел '+(cur+1)+' из '+S.length+' · Пройдено: '+p+'%';
}

// ===== DEMOS =====
function uA(){document.getElementById('dAT').style.textAlign=document.getElementById('dA').value;}
function uI(){
  var l=pF(document.getElementById('dIL').value),r=pF(document.getElementById('dIR').value);
  var fl=document.getElementById('dFL').value,fv=pF(document.getElementById('dFV').value)||1;
  var e=document.getElementById('dIT');
  e.style.marginLeft=(l*37.8)+'px';e.style.marginRight=(r*37.8)+'px';e.style.paddingLeft='0';
  if(fl==='indent'){e.style.textIndent=(fv*37.8)+'px';}
  else if(fl==='hanging'){e.style.textIndent=(-fv*37.8)+'px';e.style.paddingLeft=(fv*37.8)+'px';}
  else{e.style.textIndent='0';}
}
function gLH(t,v){switch(t){case'single':return 1;case'1.5':return 1.5;case'double':return 2;case'mul':return pF(v)||1.15;default:return 1.5;}}
function uS(){
  var b=pF(document.getElementById('dSB').value),a=pF(document.getElementById('dSA').value);
  var t=document.getElementById('dST').value;
  document.getElementById('mG').style.display=t==='mul'?'':'none';
  var mv=document.getElementById('dSM')?document.getElementById('dSM').value:'1.08';
  var lh=gLH(t,mv);
  var ps=document.querySelectorAll('#dSP .dtxt');
  for(var i=0;i<ps.length;i++){ps[i].style.lineHeight=lh;ps[i].style.marginTop=(i>0?b*1.33:0)+'px';ps[i].style.marginBottom=(a*1.33)+'px';}
}

// ===== QUIZ =====
var qAns=[1,1,2,2,2];
var qExp=['Выравнивание определяет расположение текста.','«Красная строка» → «Первая строка» → «Отступ».','«После» добавляет пустое место после абзаца.','«Множитель» — любое число.','«Образец» внизу окна — предпросмотр.'];
function cQ(){
  if(qDone)return;qDone=true;var sc=0;
  for(var i=0;i<qAns.length;i++){
    var s=document.querySelector('input[name="q'+i+'"]:checked'),fb=document.getElementById('fb'+i);
    var os=document.querySelectorAll('.qq[data-q="'+i+'"] .qo');
    if(s&&parseInt(s.value)===qAns[i]){sc++;os[qAns[i]].classList.add('ok');fb.textContent='✓ '+qExp[i];fb.className='fb show ok';}
    else{if(s)os[parseInt(s.value)].classList.add('no');os[qAns[i]].classList.add('ok');fb.textContent='✗ '+qExp[i];fb.className='fb show no';}
    var rs=document.querySelectorAll('input[name="q'+i+'"]');for(var j=0;j<rs.length;j++)rs[j].disabled=true;
  }
  var r=document.getElementById('qR'),p=Math.round((sc/qAns.length)*100);
  var st,ms;if(p===100){st='⭐⭐⭐';ms='Отлично!';}else if(p>=60){st='⭐⭐';ms='Хорошо!';}else{st='⭐';ms='Повторите материал.';}
  r.style.display='block';
  r.innerHTML='<div class="fin"><div class="fin-stars">'+st+'</div><div class="fin-score">'+sc+'/'+qAns.length+'</div><div class="fin-msg">'+ms+' ('+p+'%)</div><button class="btn btn-p" onclick="qDone=false;rSec(cur);">Ещё раз</button></div>';
  document.getElementById('qBtn').disabled=true;
}

// ===== PRACTICE =====
function pF(s){return parseFloat((s||'').toString().replace(',','.').replace(/[^\d.\-]/g,''))||0;}

function onFL(){
  var v=document.getElementById('pFV'),f=document.getElementById('pFL').value;
  if(f==='none'){v.value='';v.disabled=true;}else{v.disabled=false;if(!v.value)v.value='1,25 см';}
}
function onLT(){
  var v=document.getElementById('pLV'),t=document.getElementById('pLT').value;
  if(t==='mul'||t==='min'||t==='exact'){v.disabled=false;if(!v.value){if(t==='mul')v.value='1,15';else v.value='12 пт';}}
  else{v.value='';v.disabled=true;}
}
function uPP(){
  // Update small dialog preview
  var e=document.getElementById('pPS');
  if(e){
    e.style.textAlign=document.getElementById('pA').value;
    var fl=document.getElementById('pFL').value,fv=pF(document.getElementById('pFV').value);
    if(fl==='indent')e.style.textIndent=(fv*3)+'px';
    else if(fl==='hanging')e.style.textIndent=(-fv*3)+'px';
    else e.style.textIndent='0';
    var lt=document.getElementById('pLT').value,lv=document.getElementById('pLV').value;
    var lh=1.4;
    if(lt==='single')lh=1;else if(lt==='1.5')lh=1.5;else if(lt==='double')lh=2;else if(lt==='mul')lh=pF(lv)||1.15;
    e.style.lineHeight=lh;
  }

  // Update live text preview
  var lp1=document.getElementById('liveP1');
  var lp2=document.getElementById('liveP2');
  if(!lp1||!lp2)return;

  var align=document.getElementById('pA').value;
  var indL=pF(document.getElementById('pIL').value);
  var indR=pF(document.getElementById('pIR').value);
  var fl2=document.getElementById('pFL').value;
  var fv2=pF(document.getElementById('pFV').value);
  var spaceBefore=pF(document.getElementById('pB').value);
  var spaceAfter=pF(document.getElementById('pAf').value);
  var lt2=document.getElementById('pLT').value;
  var lv2=document.getElementById('pLV').value;
  var lh2=1.5;
  if(lt2==='single')lh2=1;else if(lt2==='1.5')lh2=1.5;else if(lt2==='double')lh2=2;else if(lt2==='mul')lh2=pF(lv2)||1.15;

  var paras=[lp1,lp2];
  for(var i=0;i<paras.length;i++){
    var p=paras[i];
    p.style.textAlign=align;
    p.style.marginLeft=(indL*37.8)+'px';
    p.style.marginRight=(indR*37.8)+'px';
    p.style.lineHeight=lh2;
    p.style.marginTop=(i>0?(spaceBefore*1.33):0)+'px';
    p.style.marginBottom=(spaceAfter*1.33)+'px';
    p.style.paddingLeft='0';
    if(fl2==='indent'){p.style.textIndent=(fv2*37.8)+'px';}
    else if(fl2==='hanging'){p.style.textIndent=(-fv2*37.8)+'px';p.style.paddingLeft=(fv2*37.8)+'px';}
    else{p.style.textIndent='0';}
  }
}
function cP(){
  var errs=[],ok=[];
  var all=document.querySelectorAll('#wd select,#wd input[type="text"]');
  for(var i=0;i<all.length;i++){all[i].classList.remove('wf-err','wf-ok');}

  var aE=document.getElementById('pA');
  if(aE.value==='justify'){ok.push('Выравнивание: по ширине ✓');aE.classList.add('wf-ok');}
  else{errs.push('Выравнивание → <strong>«По ширине»</strong>');aE.classList.add('wf-err');}

  var flE=document.getElementById('pFL');
  if(flE.value==='indent'){ok.push('Первая строка: Отступ ✓');flE.classList.add('wf-ok');}
  else{errs.push('Первая строка → <strong>«Отступ»</strong>');flE.classList.add('wf-err');}

  var fvE=document.getElementById('pFV'),fv=pF(fvE.value);
  if(Math.abs(fv-1)<0.05){ok.push('Отступ: 1 см ✓');fvE.classList.add('wf-ok');}
  else{errs.push('Отступ первой строки → <strong>1 см</strong>');fvE.classList.add('wf-err');}

  var ltE=document.getElementById('pLT'),lvE=document.getElementById('pLV');
  var lt=ltE.value,lok=false;
  if(lt==='single'||lt==='1.5')lok=true;
  else if(lt==='mul'){var mv=pF(lvE.value);if(mv>=1.0&&mv<=1.5)lok=true;}
  if(lok){ok.push('Междустрочный: корректный ✓');ltE.classList.add('wf-ok');if(!lvE.disabled)lvE.classList.add('wf-ok');}
  else{errs.push('Междустрочный → <strong>от одинарного до 1,5 строк</strong> (или множитель 1–1.5)');ltE.classList.add('wf-err');if(!lvE.disabled)lvE.classList.add('wf-err');}

  var r=document.getElementById('tR');
  if(!errs.length){
    r.innerHTML='<div style="text-align:center;font-size:2rem;margin-bottom:0.3rem;">🎉</div><strong>Отлично! Все настройки верны!</strong><ul>'+ok.map(function(c){return'<li>'+c+'</li>';}).join('')+'</ul>';
    r.className='tres show ok';
  }else{
    var h='<strong>Есть ошибки:</strong><ul>'+errs.map(function(e){return'<li>'+e+'</li>';}).join('')+'</ul>';
    if(ok.length)h+='<div style="margin-top:0.5rem;"><strong>Правильно:</strong><ul>'+ok.map(function(c){return'<li>'+c+'</li>';}).join('')+'</ul></div>';
    r.innerHTML=h;r.className='tres show no';
  }
}
function rP(){rSec(cur);}

// ===== START =====
rTabs();rSec(0);uProg();
</script>
</body>
</html>
